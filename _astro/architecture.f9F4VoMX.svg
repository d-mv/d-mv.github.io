<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="JetBrains Mono, monospace">
  <rect width="800" height="400" fill="#f2f0ea"/>
  
  <!-- Client A -->
  <rect x="50" y="150" width="120" height="80" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="65" y="180" font-size="12" fill="#0a0a0a">CLIENT A</text>
  <text x="65" y="200" font-size="8" fill="#8a8880">AES-GCM (Enc)</text>

  <!-- Signaling / Server -->
  <circle cx="400" cy="190" r="80" fill="#0a0a0a"/>
  <text x="365" y="185" font-size="14" fill="#f2f0ea" font-weight="bold">PHEME</text>
  <text x="365" y="205" font-size="10" fill="#8a8880">SIGNALING</text>

  <!-- Client B -->
  <rect x="630" y="150" width="120" height="80" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="645" y="180" font-size="12" fill="#0a0a0a">CLIENT B</text>
  <text x="645" y="200" font-size="8" fill="#8a8880">AES-GCM (Dec)</text>

  <!-- LiveKit SFU -->
  <rect x="350" y="300" width="100" height="60" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="365" y="335" font-size="12" fill="#0a0a0a">LIVEKIT</text>

  <!-- Flows -->
  <path d="M170,190 L320,190" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4 2"/>
  <path d="M480,190 L630,190" stroke="#0a0a0a" stroke-width="1" stroke-dasharray="4 2"/>
  <path d="M110,230 L350,330" stroke="#8a8880" stroke-width="1"/>
  <path d="M690,230 L450,330" stroke="#8a8880" stroke-width="1"/>

  <text x="210" y="180" font-size="8" fill="#8a8880">Encrypted Message</text>
  <text x="510" y="180" font-size="8" fill="#8a8880">Encrypted Message</text>
</svg>
