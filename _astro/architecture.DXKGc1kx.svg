<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="JetBrains Mono, monospace">
  <rect width="800" height="400" fill="#f2f0ea"/>
  
  <!-- Client -->
  <rect x="50" y="150" width="150" height="100" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="65" y="185" font-size="14" fill="#0a0a0a" font-weight="bold">REACT APP</text>
  <text x="65" y="205" font-size="10" fill="#8a8880">Vite · AntD</text>
  <text x="65" y="225" font-size="10" fill="#8a8880">Zustand · Query</text>

  <!-- Connectors -->
  <line x1="200" y1="200" x2="350" y2="200" stroke="#0a0a0a" stroke-width="1"/>
  <text x="240" y="190" font-size="10" fill="#8a8880">PostgREST</text>

  <!-- Supabase Core -->
  <rect x="350" y="100" width="200" height="200" fill="#0a0a0a"/>
  <text x="370" y="135" font-size="16" fill="#f2f0ea" font-weight="bold">SUPABASE</text>
  
  <!-- DB Internal -->
  <rect x="370" y="160" width="160" height="110" fill="none" stroke="#f2f0ea" stroke-width="1"/>
  <text x="385" y="190" font-size="12" fill="#f2f0ea">POSTGRES</text>
  <text x="385" y="210" font-size="10" fill="#8a8880">· RLS Policies</text>
  <text x="385" y="230" font-size="10" fill="#8a8880">· Pl/pgSQL Triggers</text>
  <text x="385" y="250" font-size="10" fill="#8a8880">· Realtime WAL</text>

  <!-- Auth -->
  <rect x="650" y="150" width="100" height="100" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  <text x="665" y="205" font-size="14" fill="#0a0a0a">AUTH</text>
  <line x1="550" y1="200" x2="650" y2="200" stroke="#0a0a0a" stroke-width="1"/>
</svg>
