<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" font-family="JetBrains Mono, monospace">
  <rect x="10" y="10" width="580" height="580" fill="none" stroke="#0a0a0a" stroke-width="2"/>
  
  <!-- Mobile Device Frame -->
  <rect x="180" y="80" width="240" height="440" rx="20" fill="none" stroke="#0a0a0a" stroke-width="4"/>
  <rect x="280" y="100" width="40" height="4" rx="2" fill="#0a0a0a"/>

  <!-- Waveform Composition -->
  <g transform="translate(300, 300)">
    <circle r="120" fill="none" stroke="#8a8880" stroke-width="1" stroke-dasharray="4 8"/>
    <circle r="80" fill="none" stroke="#0a0a0a" stroke-width="2"/>
    
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#0a0a0a" stroke-width="8"/>
    <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#8a8880" stroke-width="4"/>
    <line x1="-40" y1="20" x2="40" y2="20" stroke="#8a8880" stroke-width="4"/>
  </g>

  <!-- Cloud Symbol -->
  <path d="M480,450 C480,420 450,400 420,400 C420,380 400,360 380,360" fill="none" stroke="#8a8880" stroke-width="2"/>

  <g font-size="10" fill="#8a8880" letter-spacing="2">
    <text x="20" y="30">CLOUD/PLAYER</text>
    <text x="510" y="30">MOBILE</text>
    <text x="20" y="580">KOTLIN/JVM</text>
    <text x="510" y="580">DRIVE/API</text>
  </g>
</svg>
